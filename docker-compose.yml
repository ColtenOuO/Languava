services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: languava-backend:latest
    container_name: languava-api
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://languava:languava@postgres:5432/languava}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: languava-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-languava}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-languava}
      POSTGRES_DB: ${POSTGRES_DB:-languava}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-languava} -d ${POSTGRES_DB:-languava}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: languava-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
